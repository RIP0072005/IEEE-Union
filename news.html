<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/news.css">
    <title>News - FEE Union</title>
</head>
<body>

    <header>
        <a href="./index.html" class="logo1"><img src="./assets/Logo-removebg-preview.png" width="70px" alt="Logo"></a>
        <div class="list">
            <nav>
                <a href="./index.html" class="nav-link1">Home</a>
                <a href="./about.html" class="nav-link1">About</a>
                <a href="./committees.html" class="nav-link1">Committees</a>
                <a href="./events.html" class="nav-link1">Events</a>
                <a href="./news.html" class="active nav-link1">News</a>
                <a href="./contact.html" class="nav-link1">Contact & Join Us</a>
            </nav>
            <div id="menu-icon"><i class="fa-solid fa-bars-staggered"></i></div>
        </div>
        <button id="theme" class="btn1"></button>
    </header>

    <main class="container" style="padding-top: 150px;">
        <h1 class="section-title text-center">الأخبار</h1>

        <section class="news-category">
            <h2 class="category-header">أخبار الكلية:</h2>
            <div id="college-news-container">
                <p style="color: #fff; text-align: center; font-size: 1.2rem;">جاري تحميل الأخبار...</p>
            </div>
        </section>

        <section class="news-category mt-5">
            <h2 class="category-header">الانجازات:</h2>
            <div id="achievements-container">
                </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyC2T9LdO_HP7Q0hkgokOWWo-wPsBRMvMsc",
            authDomain: "fee-union.firebaseapp.com",
            databaseURL: "https://fee-union-default-rtdb.firebaseio.com/",
            projectId: "fee-union",
            storageBucket: "fee-union.firebasestorage.app",
            messagingSenderId: "96677093224",
            appId: "1:96677093224:web:5538c35947db42f62740dd",
            measurementId: "G-DM9JK6D159"
        };

        // بدء تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // سحب البيانات من السيرفر وعرضها
        database.ref('news').on('value', (snapshot) => {
            const data = snapshot.val();
            const collegeContainer = document.getElementById('college-news-container');
            const achievementsContainer = document.getElementById('achievements-container');
            
            // مسح المحتوى الحالي قبل إضافة البيانات الجديدة
            collegeContainer.innerHTML = '';
            achievementsContainer.innerHTML = '';

            if (data) {
                // تحويل البيانات لمصفوفة وعكسها ليظهر الخبر الأحدث أولاً
                const newsItems = Object.values(data).reverse();

                newsItems.forEach(item => {
                    const newsHTML = `
                        <div class="news-row">
                            <div class="news-image-box">
                                <img src="${item.img}" alt="صورة الخبر">
                            </div>
                            <div class="news-text-box">
                                <h3>${item.title}</h3>
                                <p>${item.desc}</p>
                            </div>
                        </div>
                    `;

                    // توزيع الخبر حسب الفئة المختارة في الـ Dashboard
                    if (item.category === 'college') {
                        collegeContainer.innerHTML += newsHTML;
                    } else {
                        achievementsContainer.innerHTML += newsHTML;
                    }
                });
            } else {
                collegeContainer.innerHTML = '<p style="color: #666; text-align: center;">لا توجد أخبار حالياً.</p>';
            }
        });
    </script>

    <script src="./js/script.js"></script>
</body>
</html>
