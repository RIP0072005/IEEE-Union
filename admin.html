<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/admin.css">
    <title>Dashboard - لوحة التحكم</title>
</head>
<body>

    <header>
        <a href="./index.html" class="logo1"><img src="./assets/Logo-removebg-preview.png" width="70px" alt="Logo"></a>
        <div class="list">
            <nav>
                <a href="./index.html" class="nav-link1">Home</a>
                <a href="./news.html" class="nav-link1">News</a>
                <a href="./events.html" class="nav-link1">Events</a>
                <a href="./admin.html" class="active nav-link1">Dashboard</a>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <aside class="sidebar">
            <button onclick="showSection('news-sec')" class="side-btn active"><i class="fas fa-newspaper"></i> إدارة الأخبار</button>
            <button onclick="showSection('events-sec')" class="side-btn"><i class="fas fa-calendar-alt"></i> إدارة الفعاليات</button>
        </aside>

        <section class="content-area">
            <div id="news-sec" class="admin-section">
                <h1 class="section-title">نشر خبر جديد</h1>
                <form id="news-form" class="admin-form">
                    <input type="text" id="news-title" placeholder="عنوان الخبر" required>
                    <select id="news-category">
                        <option value="college">أخبار الكلية</option>
                        <option value="achievements">إنجازات</option>
                    </select>
                    <textarea id="news-desc" placeholder="تفاصيل الخبر" rows="5" required></textarea>
                    <input type="text" id="news-img" placeholder="رابط الصورة (URL)">
                    <button type="submit" class="save-btn">حفظ ونشر الخبر</button>
                </form>
            </div>

            <div id="events-sec" class="admin-section" style="display: none;">
                <h1 class="section-title">إضافة فعالية قادمة</h1>
                <form id="event-form" class="admin-form">
                    <input type="text" id="event-name" placeholder="اسم الفعالية" required>
                    <input type="date" id="event-date" required>
                    <textarea id="event-desc" placeholder="وصف الفعالية" rows="5"></textarea>
                    <input type="text" id="event-link" placeholder="رابط التسجيل">
                    <input type="text" id="event-img" placeholder="رابط الصورة">
                    <button type="submit" class="save-btn">حفظ الفعالية</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="./js/admin.js"></script>
</body>
</html>
